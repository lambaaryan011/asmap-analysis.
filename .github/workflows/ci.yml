name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  smoke:
    name: "Smoke test (CLI end-to-end)"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate sample data and run CLI
        run: |
          python generate_sample_data.py
          python main.py \
            --baseline baseline.txt \
            --candidate candidate.txt \
            --top 5 \
            --json \
            --csv \
            --md \
            --explain

      - name: Verify output files exist and are non-empty
        run: |
          test -s output.json  && echo "output.json OK"
          test -s output.csv   && echo "output.csv OK"
          test -s report.md    && echo "report.md OK"

      - name: Validate JSON structure
        run: |
          python - <<'EOF'
          import json, sys
          with open("output.json") as f:
              d = json.load(f)
          required = {"generated_at", "summary", "insights",
                      "top_changed_asns", "changes"}
          missing = required - set(d.keys())
          if missing:
              print(f"FAIL: missing keys: {missing}", file=sys.stderr)
              sys.exit(1)
          summary_keys = {"baseline_total", "candidate_total", "added", "removed",
                          "changed", "unchanged", "total_changes", "diff_percentage",
                          "coverage_change_pct_v4", "severity_score", "severity_label"}
          missing_s = summary_keys - set(d["summary"].keys())
          if missing_s:
              print(f"FAIL: missing summary keys: {missing_s}", file=sys.stderr)
              sys.exit(1)
          print("JSON structure OK")
          EOF
